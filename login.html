<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="Author" content="Estudiante"/>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juguetería - Login</title>
    <link href="css/estilos.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <header>
    <a href="index.html" class="logo-link">
        <div class="logo-container">
            <div class="logo-caja">
                <img src="imagenes/logo.jpeg" alt="Logo" class="logo"/>
            </div>
            <span class="nombre-empresa">MUNDO JUGUETES</span>
        </div>
    </a>
    <nav>
        <ul>
            <li><a href="login.html">INICIAR SESION</a></li>
            <li><a href="galeria.html">GALERIA</a></li>
        </ul>
    </nav>
</header>

    <main>
        <div class="caja-borde">
            <img src="imagenes/imagen-principal.jpeg" class="imagen-borde" alt="Imagen Principal" />
        </div>

        <div class="login-borde-externo">
            <div class="login-borde-interno">
                <h2>INICIAR SESIÓN</h2>
                <form action="" method="POST">
                    <label for="email">Email</label>
                    <input type="email" id="email" required class="control" />
                    
                    <label for="password">Password</label>
                    <input type="password" id="password" required class="control"/>
                    
                    <center>
                        <input type="submit" value="Login" class="boton"/>
                    </center>
                </form>
            </div>
        </div>
    </main>

    <footer>
        DESARROLLADOR(A) : [HANS BRYAN NAVARRO PERÉZ]
    </footer>
</body>
</html>
